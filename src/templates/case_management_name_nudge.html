<div class="alert alert-info fd-nudge">
    <button type="button" class="close" data-dismiss="alert"
            aria-label="<%-gettext("Don't remind me")%>"
            title="<%-gettext("Don't remind me")%>">
      &laquo;
    </button>
    <i class="fa fa-info-circle"></i>
    <%=format(
      gettext("Remember to <strong>name your case</strong>. Every case must have a {name} property."),
      {name: "<code>name</code>"},
    )%>
</div>
