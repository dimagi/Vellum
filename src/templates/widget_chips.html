<div class="fd-chips">
    <% _.each(chips, function(chip) { %>
    <button class="btn fd-chip<% if (chip.active) { %> btn-primary<% } else { %> btn-default<% } %><% if (chip.disabled) { %> disabled<% } %>"
            data-slug="<%= chip.slug %>"
            type="button">
        <%= chip.label %>
    </button>
    <% }); %>
</div>
